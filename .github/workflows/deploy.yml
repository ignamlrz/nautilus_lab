name: Deploy to EC2

# Triggers:
#   - push to main when relevant files change
#   - manual run via the Actions tab (workflow_dispatch), with optional service override
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy.yml"
      - "deploy/**"
  workflow_dispatch:
    inputs:
      service:
        description: "Docker compose service name to deploy"
        required: false
        default: "orderbook-live"

# Run on a CodeBuild-hosted GitHub Actions runner. The runner label format is:
#     codebuild-<codebuild-project-name>-<run-id>-<run-attempt>
# The <codebuild-project-name> MUST match the actual CodeBuild project name
# in your AWS account (case-sensitive). See deploy/README.md.
# ${{ github.run_id }} + ${{ github.run_attempt }} pick a fresh runner slot
# per workflow run, and let retries reuse the same slot.
permissions:
  id-token: write # required by aws-actions/configure-aws-credentials with role-to-assume
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  SERVICE: ${{ github.event.inputs.service || 'orderbook-live' }}

jobs:
  build-and-deploy:
    runs-on:
      - codebuild-nautilus-deploy-runner-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Trigger EC2 deploy via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -euo pipefail

          # Ship the repo's docker-compose.yml to EC2 as base64. Avoids the need
          # for S3, git on the instance, or a deploy key — and ensures the
          # compose file on the EC2 always matches the one in the repo root.
          COMPOSE_B64=$(base64 -w0 docker-compose.yml)

          PARAMS=$(cat <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "echo '${COMPOSE_B64}' | base64 -d > /opt/nautilus-lab/docker-compose.yml",
              "export AWS_REGION='${AWS_REGION}'",
              "export ECR_REGISTRY='${ECR_REGISTRY}'",
              "export ECR_REPOSITORY='${ECR_REPOSITORY}'",
              "/opt/nautilus-lab/deploy.sh '${SERVICE}'"
            ]
          }
          EOF
          )

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --timeout-seconds 600 \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command id: $CMD_ID"
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID"

          # Surface stdout/stderr from the EC2 run in the GitHub Actions log.
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status: Status, Stdout: StandardOutputContent, Stderr: StandardErrorContent}' \
            --output json | tee /tmp/ssm-output.json

          STATUS=$(jq -r .Status /tmp/ssm-output.json)
          if [ "$STATUS" != "Success" ]; then
            echo "::error::SSM command failed with status $STATUS"
            exit 1
          fi
