name: Deploy to EC2
on: [push, workflow_dispatch]

jobs:
  deploy:
    runs-on:
      - codebuild-nautilus_lab-${{ github.run_id }}-${{ github.run_attempt }}

    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: eu-south-2
      ECR_REPOSITORY: nautilus-lab
      SERVICE: ${{ github.event.inputs.service || 'orderbook-live' }}

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-south-2

      - id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$GITHUB_SHA
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Deploy to EC2 via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          ECR_REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail

          COMPOSE_B64=$(base64 -w0 docker-compose.yml)

          PARAMS=$(cat <<EOF
          {
            "commands": [
              "set -euo pipefail",
              "echo '${COMPOSE_B64}' | base64 -d > /opt/nautilus-lab/docker-compose.yml",
              "export AWS_REGION='${AWS_REGION}'",
              "export ECR_REGISTRY='${ECR_REGISTRY}'",
              "export ECR_REPOSITORY='${ECR_REPOSITORY}'",
              "/opt/nautilus-lab/deploy.sh '${SERVICE}'"
            ]
          }
          EOF
          )

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --timeout-seconds 600 \
            --query 'Command.CommandId' \
            --output text)

          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID"

          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status: Status, Stdout: StandardOutputContent, Stderr: StandardErrorContent}' \
            --output json | tee /tmp/ssm-output.json

          STATUS=$(jq -r .Status /tmp/ssm-output.json)
          if [ "$STATUS" != "Success" ]; then
            echo "::error::SSM command failed with status $STATUS"
            exit 1
          fi
