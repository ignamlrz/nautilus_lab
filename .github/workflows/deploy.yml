name: Deploy to EC2

# Triggers:
#   - push to main when relevant files change
#   - manual run via the Actions tab (workflow_dispatch), with optional service override
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      service:
        description: "Docker compose service name to deploy"
        required: false
        default: "orderbook-live"

# Run on a CodeBuild-hosted GitHub Actions runner. The CodeBuild project
# must exist with the prefix `nautilus-deploy-runner` (see deploy/README.md).
# ${{ github.run_id }} makes each workflow run pick a fresh runner slot.
runs-on: codebuild-nautilus-deploy-runner-${{ github.run_id }}

permissions:
  id-token: write # required by aws-actions/configure-aws-credentials with role-to-assume
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
  S3_BUCKET: ${{ vars.DEPLOY_S3_BUCKET }}
  SERVICE: ${{ github.event.inputs.service || 'orderbook-live' }}

jobs:
  build-and-deploy:
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Sync docker-compose.yml to S3
        # EC2's deploy.sh fetches the compose file from here so compose
        # changes propagate without a manual SSH.
        run: |
          aws s3 cp docker-compose.yml s3://$S3_BUCKET/nautilus-lab/docker-compose.yml

      - name: Trigger EC2 deploy via SSM
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          set -euo pipefail

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='[
              "set -euo pipefail",
              "export AWS_REGION='"$AWS_REGION"'",
              "export ECR_REGISTRY='"$ECR_REGISTRY"'",
              "export ECR_REPOSITORY='"$ECR_REPOSITORY"'",
              "export COMPOSE_S3_URI=s3://'"$S3_BUCKET"'/nautilus-lab/docker-compose.yml",
              "/opt/nautilus-lab/deploy.sh '"$SERVICE"'"
            ]' \
            --timeout-seconds 600 \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command id: $CMD_ID"
          aws ssm wait command-executed \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID"

          # Surface stdout/stderr from the EC2 run in the GitHub Actions log.
          aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status: Status, Stdout: StandardOutputContent, Stderr: StandardErrorContent}' \
            --output json | tee /tmp/ssm-output.json

          STATUS=$(jq -r .Status /tmp/ssm-output.json)
          if [ "$STATUS" != "Success" ]; then
            echo "::error::SSM command failed with status $STATUS"
            exit 1
          fi
