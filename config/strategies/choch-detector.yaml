actors:
  - actor_path: src.strategies.data.actors.markets:MarketsActor
    config_path: src.strategies.data.actors.markets:MarketsActorConfig
    config:
      markets:
        ASIA:
          tz: Asia/Hong_Kong
          open_time_hour: 8
          open_time_minute: 30
          color: "#6C5CE7"
        LONDON:
          tz: Europe/London
          open_time_hour: 8
          open_time_minute: 0
          color: "#3498DB"
        NY/PRE:
          tz: America/New_York
          open_time_hour: 8
          open_time_minute: 30
          color: "#F8C471"
        NY:
          tz: America/New_York
          open_time_hour: 9
          open_time_minute: 30
          color: "#F39C12"
        NY/POST:
          tz: America/New_York
          open_time_hour: 16
          open_time_minute: 0
          color: "#CA6F1E"
      bar_type_historical: 30-MINUTE-LAST-INTERNAL
      bar_type_live: 1-MINUTE-LAST-EXTERNAL
      blackout_window:
        start_weekday: 4
        start_hour: 16
        start_minute: 0
        end_weekday: 6
        end_hour: 16
        end_minute: 0
  - actor_path: src.strategies.data.actors.bars_sync:BarSyncronizerActor
    config_path: src.strategies.data.actors.bars_sync:BarSyncronizerActorConfig
    config:
      bar_type_specs:
        - 1-MINUTE-LAST-EXTERNAL
        - 30-MINUTE-LAST-EXTERNAL
      instrument_ids:
        # crypto
        - BTCUSDT-PERP.BINANCE_FUTURES
        - XRPUSDT-PERP.BINANCE_FUTURES
        # metals
        # - XAGUSDT-PERP.BINANCE_FUTURES
      historical_data_timedelta: 1d
      log_data: False
  - actor_path: src.strategies.data.actors.telegram:TelegramActor
    config_path: src.strategies.data.actors.telegram:TelegramActorConfig
    config:
      bot_token: ${TELEGRAM_BOT_TOKEN}
      chat_ids: ${TELEGRAM_CHAT_ID}
      log_data: True
